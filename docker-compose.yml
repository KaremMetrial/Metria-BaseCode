services:
  redis:
    image: redis:7-alpine
    container_name: metrial-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - metrial-network

  socket-io:
    build:
      context: ./docker/socket-io
      dockerfile: Dockerfile
    container_name: metrial-socket-io
    restart: unless-stopped
    ports:
      - "${SOCKET_IO_PORT:-6001}:6001"
    environment:
      PORT: 6001
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LARAVEL_API_URL: "http://host.docker.internal:8000"
      CORS_ALLOWED_ORIGINS: "*"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - metrial-network

  reverb:
    image: php:8.4-cli-alpine
    container_name: metrial-reverb
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "${REVERB_PORT:-8080}:8080"
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --no-ansi
    environment:
      REVERB_APP_ID: "${REVERB_APP_ID:-metrial-app}"
      REVERB_APP_KEY: "${REVERB_APP_KEY:-metrial-key}"
      REVERB_APP_SECRET: "${REVERB_APP_SECRET:-metrial-secret}"
    networks:
      - metrial-network

volumes:
  redis_data:

networks:
  metrial-network:
    driver: bridge
